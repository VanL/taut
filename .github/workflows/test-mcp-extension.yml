name: Test MCP Extension

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.11"

jobs:
  test-mcp:
    name: test-mcp (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13", "3.14"]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: taut_test
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d taut_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            extensions/taut_mcp/pyproject.toml
            extensions/taut_mcp/uv.lock
            extensions/taut_pg/pyproject.toml

      - name: Run SQLite and PostgreSQL MCP tests
        timeout-minutes: 20
        env:
          SIMPLEBROKER_PG_TEST_DSN: postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/taut_test
        run: |
          uv run --project extensions/taut_mcp --extra dev pytest extensions/taut_mcp/tests -v --tb=short -n 0 --durations=25 --durations-min=0.5 --timeout=900 --timeout-method=thread

  test-mcp-sqlite-os:
    name: test-mcp SQLite (${{ matrix.os }}, py3.13)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            extensions/taut_mcp/pyproject.toml
            extensions/taut_mcp/uv.lock
            extensions/taut_pg/pyproject.toml

      - name: Run SQLite MCP tests
        timeout-minutes: 20
        run: |
          uv run --project extensions/taut_mcp --extra dev pytest extensions/taut_mcp/tests -v --tb=short -m "not pg_only" -n 0 --durations=25 --durations-min=0.5 --timeout=900 --timeout-method=thread

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            extensions/taut_mcp/pyproject.toml
            extensions/taut_mcp/uv.lock

      - name: Run extension linting with ruff
        timeout-minutes: 5
        run: |
          uv run --project extensions/taut_mcp --extra dev ruff check extensions/taut_mcp/taut_mcp extensions/taut_mcp/tests

      - name: Check extension formatting with ruff
        timeout-minutes: 5
        run: |
          uv run --project extensions/taut_mcp --extra dev ruff format --check extensions/taut_mcp/taut_mcp extensions/taut_mcp/tests

      - name: Type check extension with mypy
        timeout-minutes: 10
        run: |
          uv run --project extensions/taut_mcp --extra dev mypy extensions/taut_mcp/taut_mcp extensions/taut_mcp/tests --config-file extensions/taut_mcp/pyproject.toml

      - name: Build extension artifacts
        timeout-minutes: 5
        run: |
          uv build --project extensions/taut_mcp --out-dir dist/taut_mcp
