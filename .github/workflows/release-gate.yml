name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 110
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.observe.outputs.artifact_id }}
      artifact_digest: ${{ steps.observe.outputs.artifact_digest }}
      artifact_run_id: ${{ steps.observe.outputs.artifact_run_id }}
      artifact_run_attempt: ${{ steps.observe.outputs.artifact_run_attempt }}
      artifact_repository_id: ${{ steps.observe.outputs.artifact_repository_id }}
      artifact_head_repository_id: ${{ steps.observe.outputs.artifact_head_repository_id }}
      artifact_head_branch: ${{ steps.observe.outputs.artifact_head_branch }}
      tag_commit: ${{ steps.tag.outputs.tag_commit }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Resolve release tag commit
        id: tag
        timeout-minutes: 2
        run: |
          tag_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"
          [[ "${tag_commit}" =~ ^[0-9a-f]{40}$ ]]
          echo "tag_commit=${tag_commit}" >> "${GITHUB_OUTPUT}"

      - name: Observe exact-SHA workflow and artifact evidence
        id: observe
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ steps.tag.outputs.tag_commit }}
        run: |
          python bin/require-green-workflows.py wait \
            --workflow root=.github/workflows/test.yml \
            --workflow pg=.github/workflows/test-pg-extension.yml \
            --artifact-workflow root \
            --artifact-prefix release-taut

  publish-release:
    needs: release-evidence
    uses: ./.github/workflows/release.yml
    with:
      package_name: taut
      package_dir: .
      tag_name: ${{ github.ref_name }}
      release_ref: ${{ needs.release-evidence.outputs.tag_commit }}
      expected_tag_commit: ${{ needs.release-evidence.outputs.tag_commit }}
      evidence_run_id: ${{ needs.release-evidence.outputs.artifact_run_id }}
      evidence_run_attempt: ${{ needs.release-evidence.outputs.artifact_run_attempt }}
      evidence_branch: ${{ needs.release-evidence.outputs.artifact_head_branch }}
      artifact_prefix: release-taut
      artifact_id: ${{ needs.release-evidence.outputs.artifact_id }}
      artifact_digest: ${{ needs.release-evidence.outputs.artifact_digest }}
      artifact_repository_id: ${{ needs.release-evidence.outputs.artifact_repository_id }}
      artifact_head_repository_id: ${{ needs.release-evidence.outputs.artifact_head_repository_id }}
    permissions:
      actions: read
      contents: write
