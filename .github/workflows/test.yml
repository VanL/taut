name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.11"

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        id: install
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]" -e "./extensions/taut_summon[dev]"

      - name: Run tests with pytest
        if: ${{ matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13' }}
        timeout-minutes: 20
        run: |
          pytest -v --tb=short -m "not slow and not installed_wheel" --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

      - name: Run tests with coverage
        id: root_coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
        timeout-minutes: 20
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage.root-unit
        run: |
          python -m coverage erase
          python -m coverage run --parallel-mode -m pytest -v --tb=short -m "not slow and not installed_wheel" --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

      - name: Run installed-wheel tests
        if: ${{ !cancelled() && steps.install.outcome == 'success' && ((matrix.os == 'ubuntu-latest' && matrix.python-version != '3.13') || (matrix.os == 'macos-latest' && matrix.python-version == '3.13') || (matrix.os == 'windows-latest' && matrix.python-version == '3.11')) }}
        timeout-minutes: 10
        run: |
          pytest -v --tb=short -m "not slow and installed_wheel" -n 0 --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

      - name: Run installed-wheel tests with coverage
        if: ${{ !cancelled() && steps.install.outcome == 'success' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
        timeout-minutes: 10
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage.root-unit
        run: |
          python -m coverage run --parallel-mode -m pytest -v --tb=short -m "not slow and installed_wheel" -n 0 --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

      - name: Run taut-summon extension unit tests
        if: ${{ matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13' }}
        timeout-minutes: 10
        run: |
          pytest extensions/taut_summon/tests -v --tb=short -m "not xdist_group"

      - name: Run taut-summon extension unit tests with coverage
        id: summon_unit_coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
        timeout-minutes: 10
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage.root-unit
        run: |
          python -m coverage run --parallel-mode -m pytest extensions/taut_summon/tests -v --tb=short -m "not xdist_group"

      - name: Upload root and unit coverage data
        if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && (steps.root_coverage.outcome != 'skipped' || steps.summon_unit_coverage.outcome != 'skipped') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-root-unit
          path: ${{ github.workspace }}/.coverage.root-unit.*
          if-no-files-found: error
          include-hidden-files: true

      - name: Test CLI installation
        timeout-minutes: 2
        run: |
          taut --version
          taut-summon --help

  summon-process:
    name: taut-summon process (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]" -e "./extensions/taut_summon[dev]"

      - name: Run taut-summon extension process tests
        if: ${{ matrix.os != 'ubuntu-latest' || matrix.python-version != '3.13' }}
        timeout-minutes: 15
        run: |
          pytest extensions/taut_summon/tests -v --tb=short -m "xdist_group and not requires_live_harness and not requires_local_llm" -n 2 --dist load

      - name: Run taut-summon extension process tests with coverage
        id: summon_process_coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' }}
        timeout-minutes: 15
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage.summon-process
        run: |
          python -m coverage erase
          python -m coverage run --parallel-mode -m pytest extensions/taut_summon/tests -v --tb=short -m "xdist_group and not requires_live_harness and not requires_local_llm" -n 2 --dist load

      - name: Upload process coverage data
        if: ${{ always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && steps.summon_process_coverage.outcome != 'skipped' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-summon-process
          path: ${{ github.workspace }}/.coverage.summon-process.*
          if-no-files-found: error
          include-hidden-files: true

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]" -e "./extensions/taut_summon[dev]"

      - name: Run linting with ruff
        timeout-minutes: 5
        run: |
          ruff check taut tests bin extensions/taut_summon/taut_summon extensions/taut_summon/tests

      - name: Check formatting with ruff
        timeout-minutes: 5
        run: |
          ruff format --check taut tests bin extensions/taut_summon/taut_summon extensions/taut_summon/tests

      - name: Type check with mypy
        timeout-minutes: 10
        run: |
          mypy taut tests bin/release.py bin/release-artifact.py bin/require-green-workflows.py --config-file pyproject.toml
          mypy extensions/taut_summon/taut_summon extensions/taut_summon/tests --config-file pyproject.toml

  summon-local-llm:
    name: taut-summon local LLM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OLLAMA_BASE_MODEL: qwen2.5:0.5b
      OLLAMA_CONTEXT_LENGTH: "2048"
      OLLAMA_NUM_PREDICT: "64"
      OLLAMA_IMAGE: ollama/ollama@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc
      TAUT_SUMMON_LOCAL_LLM_ENDPOINT: http://127.0.0.1:11434/v1
      TAUT_SUMMON_LOCAL_LLM_MODEL: taut-summon-local-model:latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Start Ollama
        timeout-minutes: 2
        run: |
          docker run -d \
            --name taut-summon-llm \
            -p 127.0.0.1:11434:11434 \
            "${OLLAMA_IMAGE}"

      - name: Wait for Ollama readiness
        timeout-minutes: 3
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:11434/" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs taut-summon-llm || true
          exit 1

      - name: Pull base model and create bounded served model
        timeout-minutes: 12
        run: |
          docker exec taut-summon-llm ollama pull "${OLLAMA_BASE_MODEL}"
          cat > "${RUNNER_TEMP}/TautSummonModelfile" <<EOF
          FROM ${OLLAMA_BASE_MODEL}
          PARAMETER num_ctx ${OLLAMA_CONTEXT_LENGTH}
          PARAMETER num_predict ${OLLAMA_NUM_PREDICT}
          PARAMETER temperature 0
          EOF
          docker cp "${RUNNER_TEMP}/TautSummonModelfile" taut-summon-llm:/tmp/TautSummonModelfile
          docker exec taut-summon-llm ollama create "${TAUT_SUMMON_LOCAL_LLM_MODEL}" -f /tmp/TautSummonModelfile

      - name: Wait for served model
        timeout-minutes: 3
        run: |
          model_ready=false
          for _ in $(seq 1 60); do
            if python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          endpoint = os.environ["TAUT_SUMMON_LOCAL_LLM_ENDPOINT"].rstrip("/") + "/models"
          served = os.environ["TAUT_SUMMON_LOCAL_LLM_MODEL"]
          try:
              with urllib.request.urlopen(endpoint, timeout=5) as response:
                  payload = json.load(response)
          except Exception as exc:
              print(f"waiting for model list: {exc}")
              sys.exit(1)
          ids = [
              item.get("id")
              for item in payload.get("data", [])
              if isinstance(item, dict)
          ]
          if served in ids:
              sys.exit(0)
          print(f"waiting for {served!r}; saw ids: {ids}")
          sys.exit(1)
          PY
            then
              model_ready=true
              break
            fi
            sleep 2
          done
          if [[ "${model_ready}" != "true" ]]; then
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          endpoint = (
              os.environ["TAUT_SUMMON_LOCAL_LLM_ENDPOINT"].rstrip("/")
              + "/chat/completions"
          )
          body = json.dumps(
              {
                  "model": os.environ["TAUT_SUMMON_LOCAL_LLM_MODEL"],
                  "messages": [{"role": "user", "content": "Reply with ready."}],
                  "max_tokens": 1,
                  "stream": False,
              }
          ).encode("utf-8")
          request = urllib.request.Request(
              endpoint,
              data=body,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  payload = json.load(response)
          except Exception as exc:
              print(f"chat completion readiness failed: {exc}", file=sys.stderr)
              sys.exit(1)
          if not isinstance(payload, dict):
              print("chat completion readiness returned a non-object", file=sys.stderr)
              sys.exit(1)
          choices = payload.get("choices")
          if not isinstance(choices, list) or not choices:
              print("chat completion readiness returned no choices", file=sys.stderr)
              sys.exit(1)
          first = choices[0]
          message = first.get("message") if isinstance(first, dict) else None
          content = message.get("content") if isinstance(message, dict) else None
          if not isinstance(content, str):
              print("chat completion readiness returned no content", file=sys.stderr)
              sys.exit(1)
          print("chat completion readiness succeeded")
          PY

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]" -e "./extensions/taut_summon[dev]"

      - name: Run taut-summon local LLM live tests
        id: local_llm_coverage
        timeout-minutes: 10
        env:
          TAUT_SUMMON_LOCAL_LLM: "1"
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage.local-llm
        run: |
          python -m coverage erase
          python -m coverage run --parallel-mode -m pytest extensions/taut_summon/tests/test_live_local_llm.py -v --tb=short -m requires_local_llm -n 1 --dist loadgroup

      - name: Upload local LLM coverage data
        if: ${{ always() && steps.local_llm_coverage.outcome != 'skipped' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-data-local-llm
          path: ${{ github.workspace }}/.coverage.local-llm.*
          if-no-files-found: error
          include-hidden-files: true

      - name: Local LLM diagnostics
        if: always()
        run: |
          free -m || true
          df -h || true
          docker logs taut-summon-llm 2>&1 | grep -Ei 'server|listen|model|pull|load|memory|error|ready' || true

      - name: Stop Ollama
        if: always()
        run: docker stop taut-summon-llm || true

  packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Build core package
        timeout-minutes: 10
        run: |
          uv build --out-dir release-dist/core .

      - name: Build taut-summon extension package
        timeout-minutes: 10
        run: |
          uv build --out-dir release-dist/summon extensions/taut_summon

      - name: Build taut-pg release package
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        timeout-minutes: 10
        run: |
          uv build --out-dir release-dist/pg extensions/taut_pg

      - name: Check paired release wheels
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        shell: bash
        timeout-minutes: 20
        run: |
          core_wheels=(release-dist/core/*.whl)
          summon_wheels=(release-dist/summon/*.whl)
          test "${#core_wheels[@]}" -eq 1
          test "${#summon_wheels[@]}" -eq 1
          python bin/build-and-check-release-wheels.py \
            --core-wheel "${core_wheels[0]}" \
            --summon-wheel "${summon_wheels[0]}"

      - name: Smoke test core wheel
        shell: bash
        timeout-minutes: 10
        run: |
          python -m venv /tmp/taut-wheel-smoke
          source /tmp/taut-wheel-smoke/bin/activate
          python -m pip install release-dist/core/*.whl
          taut --version

      - name: Smoke test taut-pg wheel with paired core
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        shell: bash
        timeout-minutes: 10
        run: |
          python -m venv /tmp/taut-pg-wheel-smoke
          source /tmp/taut-pg-wheel-smoke/bin/activate
          python -m pip install release-dist/core/*.whl release-dist/pg/*.whl
          python - <<'PY'
          import taut_pg
          from simplebroker.ext import get_backend_plugin

          assert taut_pg.__all__ == []
          assert get_backend_plugin("postgres").name == "postgres"
          PY

      - name: Create release provenance bundles
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        timeout-minutes: 5
        run: |
          python bin/release-artifact.py create --package-dir . --dist-dir release-dist/core --output-dir release-bundles/taut --commit "${{ github.sha }}"
          python bin/release-artifact.py create --package-dir extensions/taut_summon --dist-dir release-dist/summon --output-dir release-bundles/taut-summon --commit "${{ github.sha }}"
          python bin/release-artifact.py create --package-dir extensions/taut_pg --dist-dir release-dist/pg --output-dir release-bundles/taut-pg --commit "${{ github.sha }}"

      - name: Upload core release evidence
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-taut-attempt-${{ github.run_attempt }}
          path: release-bundles/taut/
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload Summon release evidence
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-taut-summon-attempt-${{ github.run_attempt }}
          path: release-bundles/taut-summon/
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload PG release evidence
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-taut-pg-attempt-${{ github.run_attempt }}
          path: release-bundles/taut-pg/
          if-no-files-found: error
          include-hidden-files: true

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, summon-process, summon-local-llm]
    if: ${{ always() && !cancelled() }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]" -e "./extensions/taut_summon[dev]"

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-data-*
          path: coverage-data
          merge-multiple: true

      - name: Combine coverage reports
        timeout-minutes: 5
        run: |
          python -m coverage combine coverage-data
          python bin/check-required-coverage-paths.py
          python -m coverage report --include="*/taut_summon/_driver.py" --fail-under=1
          python -m coverage report --include="*/taut_summon/_control.py" --fail-under=1
          python -m coverage report --include="*/taut_summon/cli.py" --fail-under=1
          python -m coverage report --show-missing
          python -m coverage xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: VanL/taut
