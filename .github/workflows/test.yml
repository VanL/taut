name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.11"

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: macos-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests with pytest
        timeout-minutes: 20
        run: |
          pytest -v --tb=short -m "not slow" --durations=100 --durations-min=0.5 -o faulthandler_timeout=720 --timeout=900 --timeout-method=thread --full-trace

      - name: Test CLI installation
        timeout-minutes: 2
        run: |
          taut --version

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run linting with ruff
        timeout-minutes: 5
        run: |
          ruff check taut tests bin assets/gen_taut_logo.py generate_knot.py

      - name: Check formatting with ruff
        timeout-minutes: 5
        run: |
          ruff format --check taut tests bin assets/gen_taut_logo.py generate_knot.py

      - name: Type check with mypy
        timeout-minutes: 10
        run: |
          mypy taut tests bin/release.py --config-file pyproject.toml

  packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml

      - name: Build package
        timeout-minutes: 10
        run: |
          uv build

      - name: Smoke test built wheel
        shell: bash
        timeout-minutes: 10
        run: |
          python -m venv /tmp/taut-wheel-smoke
          source /tmp/taut-wheel-smoke/bin/activate
          python -m pip install dist/*.whl
          taut --version
