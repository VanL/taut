name: Release

on:
  workflow_call:
    inputs:
      package_name:
        description: Package name used for workflow artifacts.
        required: true
        type: string
      package_dir:
        description: Package directory whose manifest verifies the artifact.
        required: true
        type: string
      tag_name:
        description: Release tag to publish and attach artifacts to.
        required: true
        type: string
      release_ref:
        description: Git ref to check out for publication.
        required: true
        type: string
      expected_tag_commit:
        description: Commit SHA the release tag is expected to reference.
        required: true
        type: string
      evidence_run_id:
        description: Canonical Test workflow run that produced the artifact.
        required: true
        type: string
      evidence_run_attempt:
        description: Canonical Test workflow attempt that produced the artifact.
        required: true
        type: string
      evidence_branch:
        description: Canonical branch recorded on the producing workflow.
        required: true
        type: string
      artifact_prefix:
        description: Attempt-qualified artifact name prefix.
        required: true
        type: string
      artifact_id:
        description: Immutable GitHub Actions artifact id.
        required: true
        type: string
      artifact_digest:
        description: GitHub archive sha256 digest from artifact metadata.
        required: true
        type: string
      artifact_repository_id:
        description: Numeric repository id recorded on the artifact.
        required: true
        type: string
      artifact_head_repository_id:
        description: Numeric head-repository id recorded on the artifact.
        required: true
        type: string

jobs:
  github-release:
    name: Upload verified artifact to GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          ref: ${{ inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Verify checked out commit matches tested release commit
        timeout-minutes: 2
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_tag_commit }}"

      - name: Reverify immutable artifact metadata
        timeout-minutes: 2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ inputs.expected_tag_commit }}
        run: |
          python bin/require-green-workflows.py verify-artifact \
            --artifact-id "${{ inputs.artifact_id }}" \
            --artifact-digest "${{ inputs.artifact_digest }}" \
            --artifact-prefix "${{ inputs.artifact_prefix }}" \
            --run-id "${{ inputs.evidence_run_id }}" \
            --run-attempt "${{ inputs.evidence_run_attempt }}" \
            --repository-id "${{ inputs.artifact_repository_id }}" \
            --head-repository-id "${{ inputs.artifact_head_repository_id }}" \
            --branch "${{ inputs.evidence_branch }}"

      - name: Download the exact tested distribution bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          artifact-ids: ${{ inputs.artifact_id }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.evidence_run_id }}
          path: bundle/
          merge-multiple: true

      - name: Verify inner provenance and distribution bytes
        timeout-minutes: 2
        run: |
          python bin/release-artifact.py verify \
            --package-dir "${{ inputs.package_dir }}" \
            --bundle-dir bundle \
            --commit "${{ inputs.expected_tag_commit }}" \
            --tag-name "${{ inputs.tag_name }}" \
            --output-dir dist

      - name: Verify release tag still points at tested commit
        timeout-minutes: 5
        env:
          EXPECTED_SHA: ${{ inputs.expected_tag_commit }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags "https://github.com/${REPOSITORY}.git" "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the publish workflow was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        timeout-minutes: 5
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
