name: Release

on:
  workflow_call:
    inputs:
      package_name:
        description: Package name used for workflow artifacts.
        required: true
        type: string
      package_dir:
        description: Package directory to build from.
        required: true
        type: string
      tag_name:
        description: Release tag to publish and attach artifacts to.
        required: true
        type: string
      release_ref:
        description: Git ref to check out for the release build.
        required: true
        type: string
      expected_tag_commit:
        description: Commit SHA the release tag is expected to reference.
        required: true
        type: string

env:
  UV_VERSION: "0.11.11"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5
        with:
          ref: ${{ inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Verify checked out commit matches tested release commit
        timeout-minutes: 2
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_tag_commit }}"

      - name: Build package
        working-directory: ${{ inputs.package_dir }}
        timeout-minutes: 10
        run: |
          uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: 5
        with:
          name: ${{ inputs.package_name }}-python-package-distributions
          path: ${{ inputs.package_dir }}/dist/

  verify-tag-current:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - build

    steps:
      - name: Verify release tag still points at tested commit
        timeout-minutes: 5
        env:
          EXPECTED_SHA: ${{ inputs.expected_tag_commit }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags "https://github.com/${REPOSITORY}.git" "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the publish workflow was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  github-release:
    name: Upload to GitHub Release
    needs:
      - build
      - verify-tag-current
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          name: ${{ inputs.package_name }}-python-package-distributions
          path: dist/

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        timeout-minutes: 5
        with:
          generate_release_notes: true
          tag_name: ${{ inputs.tag_name }}
          files: |
            dist/*.tar.gz
            dist/*.whl
