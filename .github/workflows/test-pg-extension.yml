name: Test Postgres Extension

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.11"

jobs:
  test-pg:
    name: test-pg (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            extensions/taut_pg/pyproject.toml

      - name: Run PG-backed test suites
        timeout-minutes: 30
        run: |
          uv run ./bin/pytest-pg

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        timeout-minutes: 5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        timeout-minutes: 5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        timeout-minutes: 5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            extensions/taut_pg/pyproject.toml

      - name: Run extension linting with ruff
        timeout-minutes: 5
        run: |
          uv run --extra dev ruff check extensions/taut_pg/taut_pg extensions/taut_pg/tests bin/pytest-pg

      - name: Check extension formatting with ruff
        timeout-minutes: 5
        run: |
          uv run --extra dev ruff format --check extensions/taut_pg/taut_pg extensions/taut_pg/tests bin/pytest-pg

      - name: Type check extension with mypy
        timeout-minutes: 10
        run: |
          uv run --extra dev mypy taut/_scripts.py extensions/taut_pg/taut_pg extensions/taut_pg/tests --config-file pyproject.toml

